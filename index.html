<!DOCTYPE html>
<html>
<head>

<title>Vishnu | Portfolio</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</head>

<body>

<canvas id="network"></canvas>

<div id="terminal">
<p id="terminal-text"></p>
</div>

<header>

<h1>VishnuRaj</h1>
<p>Computer Engineering Student | Future Cloud Engineer</p>

</header>

<div id="earth"></div>

<section>

<h2>About</h2>

<p>
Computer Engineering student passionate about Cloud Computing, AI and Data Analysis.
</p>

</section>

<section>

<h2>Skills</h2>

<div class="card">HTML</div>
<div class="card">CSS</div>
<div class="card">Python</div>
<div class="card">Pandas</div>

</section>

<section>

<h2>Projects</h2>

<div class="project">

<h3>Stock Prediction</h3>

<p>ARIMA based stock market prediction project.</p>

</div>

</section>

<div id="chatbot">

<div id="chat-header">Assistant</div>

<div id="chat-body"></div>

<input id="chat-input" placeholder="Ask something...">

</div>

<script>

/* Terminal intro */

const text="> Booting Portfolio...\n> Loading Developer Profile...\n> Welcome VishnuRaj";

let i=0;

function type(){

if(i<text.length){

document.getElementById("terminal-text").innerHTML += text.charAt(i);

i++;

setTimeout(type,40);

}

}

type();

setTimeout(()=>{

document.getElementById("terminal").style.display="none";

},4000);


/* Neural network */

const canvas=document.getElementById("network");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let nodes=[];

for(let i=0;i<70;i++){

nodes.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

vx:(Math.random()-0.5),

vy:(Math.random()-0.5)

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

nodes.forEach(n=>{

n.x+=n.vx;

n.y+=n.vy;

ctx.fillStyle="cyan";

ctx.beginPath();

ctx.arc(n.x,n.y,2,0,Math.PI*2);

ctx.fill();

nodes.forEach(n2=>{

let dx=n.x-n2.x;

let dy=n.y-n2.y;

let d=Math.sqrt(dx*dx+dy*dy);

if(d<120){

ctx.strokeStyle="rgba(0,255,255,0.2)";

ctx.beginPath();

ctx.moveTo(n.x,n.y);

ctx.lineTo(n2.x,n2.y);

ctx.stroke();

}

});

});

requestAnimationFrame(draw);

}

draw();


/* 3D Earth */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(75,300/300,0.1,1000);

const renderer=new THREE.WebGLRenderer({alpha:true});

renderer.setSize(250,250);

document.getElementById("earth").appendChild(renderer.domElement);

const geo=new THREE.SphereGeometry(2,32,32);

const tex=new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg");

const mat=new THREE.MeshBasicMaterial({map:tex});

const earth=new THREE.Mesh(geo,mat);

scene.add(earth);

camera.position.z=5;

function animateEarth(){

requestAnimationFrame(animateEarth);

earth.rotation.y+=0.003;

renderer.render(scene,camera);

}

animateEarth();


/* Chatbot */

const input=document.getElementById("chat-input");

const body=document.getElementById("chat-body");

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let msg=input.value;

body.innerHTML+="<div class='user'>"+msg+"</div>";

body.innerHTML+="<div class='bot'>Hello! I'm Vishnu's assistant.</div>";

input.value="";

}

});

</script>

</body>
</html>
</script>

</body>
</html>
